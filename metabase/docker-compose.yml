services:
  metabase:
    build:
      context: .
      args:
        METABASE_VERSION: "0.59.8"
    container_name: pizzeria-metabase-duckdb
    ports:
      - "3000:3000"
    volumes:
      - ../data:/data
      - ./metabase-data:/metabase-data
    environment:
      MB_PLUGINS_DIR: /app/plugins
      MB_DB_FILE: /metabase-data/metabase.db

